<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  background: #0E0F11;
  font-family: Georgia, serif;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 72px;
}
.eyebrow {
  font-family: 'Courier New', monospace;
  font-size: 18px;
  color: #5C6270;
  text-transform: uppercase;
  letter-spacing: 4px;
}
.headline {
  font-size: 96px;
  color: #F2F3F5;
  line-height: 1.0;
  font-weight: 400;
}
.sub {
  font-size: 32px;
  color: #9AA0AD;
  margin-top: 24px;
  font-family: -apple-system, sans-serif;
  font-weight: 400;
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.brand {
  font-size: 36px;
  color: #E8A832;
  font-weight: 600;
  font-family: Georgia, serif;
}
.stat {
  font-family: 'Courier New', monospace;
  font-size: 24px;
  color: #3D424F;
}
</style>
</head>
<body>
  <div class="eyebrow">The App Store for Claude</div>
  <div>
    <div class="headline">Install<br>intelligence.</div>
    <div class="sub">300+ curated Claude skills. Connect once, install anything.</div>
  </div>
  <div class="footer">
    <div class="brand">SkillShelf</div>
    <div class="stat">browse · install · manage</div>
  </div>
</body>
</html>
